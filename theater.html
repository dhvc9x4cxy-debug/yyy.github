<div class="container">
    <h2 class="section-title"><i class="fas fa-calendar-alt"></i> 近期好戏 · 全国演出推荐</h2>
    <div class="card-grid" id="theaterList"></div>
    <div class="map-placeholder">
        <i class="fas fa-map-marked-alt fa-2x"></i>

    </div>
</div>
<footer><p>约·梨园 | 线下演出票务合作 · 让更多年轻人走进剧场</p></footer>
<script>
    const shows = [
        { name: "《穆桂英挂帅》梅派经典", date: "2025.06.10 19:30", venue: "北京梅兰芳大剧院", price: "180-880" },
        { name: "京剧名家名段演唱会", date: "2025.06.18 19:15", venue: "上海东方艺术中心", price: "280-1280" },
        { name: "国潮京剧电音派对·破圈之夜", date: "2025.07.01 20:00", venue: "杭州运河剧场", price: "199-520" },
        { name: "《锁麟囊》程派传习展演", date: "2025.07.12 14:00", venue: "天津中华剧院", price: "120-380" },
        { name: "京剧名家折子戏专场", date: "2025.07.20 19:30", venue: "成都锦江剧场", price: "100-580" }
    ];
    const theaterContainer = document.getElementById("theaterList");
    theaterContainer.innerHTML = shows.map(show => `
        <div class="card"><div class="card-content"><span class="tag"><i class="fas fa-calendar-alt"></i> ${show.date}</span><h3>🎫 ${show.name}</h3><p><i class="fas fa-location-dot"></i> ${show.venue}</p><p>💰 ${show.price}</p><button class="btn" onclick="alert('跳转至官方票务API，完成购票流程。支持线下观演，助力京剧破圈')">立即购票</button></div></div>
    `).join('');
</script>
